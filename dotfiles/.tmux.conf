# Enable mouse mode
# Disable to disable copy mode
set-option -g mouse on

# Increase scrollback buffer size
set -g history-limit 1000000

# Display messages for 4 seconds
set -g display-time 4000

# Refresh status bar every 5 seconds
set -g status-interval 1

# Set terminal to use 256 colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -as terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# OSC 52 clipboard: let programs (e.g. OpenCode TUI) set the system clipboard.
# 'on' stores into the tmux buffer (PREFIX+] paste works) AND forwards the OSC 52
# escape out to the host terminal (Windows Terminal) via the 'Ms' capability, so
# the copy lands in the host clipboard too. The ':clipboard' feature forces the
# forwarding even if the outer terminal does not advertise the capability itself.
# NOTE: unrelated to allow-passthrough (kept off for the OSC-leak fix below).
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

# Enable focus events (useful in supporting terminals)
set -g focus-events on


# Set aggressive resizing of panes
setw -g aggressive-resize on

# Set base index to 1 (start window numbering from 1)
set -g base-index 1
setw -g pane-base-index 1

# DESIGN TWEAKS
# Inactive panes (light grey), active pane border (neon blue)
set -g pane-border-style fg=colour250
set -g pane-active-border-style fg=colour45

# Status bar at the bottom, justified left
set -g status-position bottom
set -g status-justify left

# Status bar background (dark grey) and text (white)
set -g status-style 'fg=white bg=colour236'

# Empty left status
set -g status-left ''
set -g status-left-length 10

# Right status showing weekday, date, and time
set -g status-right '#(date +"%A"), %Y-%m-%d %H:%M:%S '
set -g status-right-style 'fg=white bg=colour236'
set -g status-right-length 50

# Active window (neon blue text on black background)
setw -g window-status-current-style 'fg=colour45 bg=black'
setw -g window-status-current-format ' [x] #I #W '

# Inactive windows (light grey text on dark grey background)
setw -g window-status-style 'fg=colour250 bg=colour236'
setw -g window-status-format ' [ ] #I #W '

# Bell notification (bold neon blue on light grey)
setw -g window-status-bell-style 'fg=colour45 bg=colour250 bold'

# Messages (white text on dark grey background)
set -g message-style 'fg=white bg=colour236 bold'

# Clock mode (neon blue clock)
setw -g clock-mode-colour colour45

# prevent weird characters on start
set -sg escape-time 50

# Open new windows and pane splits in the current pane's path
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# get env variables
set-option -g update-environment "DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK"

# Set copy command for linux with desktop environment
# set -s copy-command 'wl-copy'

# Escape/passthrough handling
# allow-passthrough + extended-keys were previously ON (for Claude Code), but
# they leaked OSC color-query / DA responses (rgb:.../ ;NN;NN c) as visible
# garbage on tab-switch and reattach/reconnect. Turned OFF to stop the leak.
# Trade-off: loses tmux passthrough (image protocols, some Claude Code escape
# features). Re-enable individually only if a tool truly needs it.
set -g allow-passthrough off
set -s extended-keys off

# Compact centered popup with native session switcher (arrow keys + live preview)
# Removed -Z flag to prevent zoom conflict inside popup
bind s display-popup -E -h 20 -w 60 -x C -y C "tmux choose-tree -s"
